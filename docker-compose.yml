services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veyli-admin
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8088:8000"
    depends_on:
      - mysql

  node:
    image: node:20
    container_name: veyli_node
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: veyli_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: veyli_db
      MYSQL_USER: veyli_user
      MYSQL_PASSWORD: 'getallover?45q+*'
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: